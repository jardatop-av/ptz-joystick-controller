# Copy this file to config.local.yaml for machine-specific settings.
# config.local.yaml is loaded after config.example.yaml and is ignored by Git.
# Only include values you want to override locally.

switcher:
  host: 127.0.0.1
  port: 8088

sources:
  mappings:
    - source_id: Input 1
      ptz_camera_id: cam1
    - source_id: Input 2
      ptz_camera_id: cam2
    - source_id: Input 3
      ptz_camera_id: null
    - source_id: Input 4
      ptz_camera_id: null

ptz:
  cameras:
    - id: cam1
      host: 192.168.1.110
      enabled: true
    - id: cam2
      enabled: false
